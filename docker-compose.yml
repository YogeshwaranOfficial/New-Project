version: "3.9"

services:
  backend:
    build:
      context: ./server
      dockerfile: ../docker/server/Dockerfile

    ports:
      - "5000:5000"

    env_file:
      - ./server/.env

    depends_on:
      - postgres

  postgres:
    image: postgres:16

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: library_management_system

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: