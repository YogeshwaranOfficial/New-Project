name: Backend CI Pipeline

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend-ci:
    runs-on: ubuntu-latest

    env:
      PORT: 3000
      NODE_ENV: test
      JWT_SECRET: ci_environment_mock_secret_key_string
      DATABASE_URL: postgresql://mock_user:mock_password@localhost:5432/mock_db
      # 1. Force the runner engine to execute internal JS actions on Node 24 
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    defaults:
      run:
        working-directory: server

    steps:
      # 2. Checkout repository (v4 is fine with the flag, or keep an eye out for updates)
      - name: Checkout Repository
        uses: actions/checkout@v4

      # 3. Setup modern Node runner environment
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Run TypeScript Build
        run: npm run build

      - name: Run Unit Tests
        run: npm run test:unit